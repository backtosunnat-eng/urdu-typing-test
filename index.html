<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اردو ٹائپنگ ٹیسٹ</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #f5f5f0;
    color: #1a1a1a;
    min-height: 100vh;
    padding: 2rem 1rem;
  }
  .container {
    max-width: 820px;
    margin: 0 auto;
    background: #ffffff;
    border-radius: 16px;
    padding: 2rem 2.5rem;
    border: 1px solid #e0ddd4;
  }
  h1 {
    font-size: 22px;
    font-weight: 500;
    text-align: center;
    margin-bottom: 1.5rem;
    color: #1a1a1a;
  }
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 1rem;
  }
  .timer-display {
    font-size: 34px;
    font-weight: 500;
    color: #1a1a1a;
    min-width: 80px;
    text-align: center;
  }
  .timer-display.warning { color: #c0392b; }
  .controls {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  label { font-size: 13px; color: #666; }
  select {
    font-size: 13px;
    padding: 6px 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    outline: none;
    color: #1a1a1a;
  }
  select:focus { border-color: #534AB7; }
  button {
    font-size: 13px;
    padding: 7px 18px;
    border: 1px solid #bbb;
    border-radius: 8px;
    background: transparent;
    cursor: pointer;
    color: #1a1a1a;
    transition: background 0.15s;
  }
  button:hover { background: #f0efe8; }
  .para-box {
    background: #f5f5f0;
    border: 1px solid #e0ddd4;
    border-radius: 12px;
    padding: 1.5rem 1.75rem;
    margin-bottom: 1rem;
    direction: rtl;
    text-align: right;
  }
  #para-text {
    font-size: 20px;
    line-height: 2.8;
    color: #1a1a1a;
    font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', serif;
    transition: font-size 0.2s;
  }
  .size-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 0.75rem;
    flex-wrap: wrap;
  }
  .size-bar span { font-size: 13px; color: #666; margin-left: 4px; }
  .size-btn {
    font-size: 12px;
    padding: 4px 10px;
    border: 1px solid #ccc;
    border-radius: 20px;
    background: transparent;
    cursor: pointer;
    color: #555;
    transition: all 0.15s;
    font-weight: 400;
  }
  .size-btn:hover { background: #f0efe8; border-color: #999; }
  .size-btn.active {
    background: #534AB7;
    border-color: #534AB7;
    color: #fff;
  }
  #status-msg {
    font-size: 13px;
    color: #888;
    margin-bottom: 0.75rem;
    min-height: 20px;
    text-align: right;
  }
  .textarea-wrap { position: relative; }
  #user-input {
    width: 100%;
    font-size: 19px;
    line-height: 2.6;
    direction: rtl;
    text-align: right;
    font-family: 'Noto Nastaliq Urdu', 'Jameel Noori Nastaleeq', serif;
    padding: 1rem;
    border-radius: 10px;
    border: 1px solid #ccc;
    background: #fff;
    color: #1a1a1a;
    resize: none;
    display: block;
    transition: border-color 0.2s, font-size 0.2s;
  }
  #user-input:focus { outline: none; border-color: #534AB7; }
  #user-input:disabled { background: #f5f5f0; color: #888; }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: #f5f5f0;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    color: #888;
    cursor: text;
    border: 1px solid #ddd;
    z-index: 2;
  }
  #finished-banner {
    background: #eaf3de;
    border: 1px solid #97c459;
    border-radius: 12px;
    padding: 1rem 1.25rem;
    text-align: center;
    color: #3B6D11;
    font-size: 15px;
    font-weight: 500;
    margin-top: 1rem;
    display: none;
  }
  .results-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 1.5rem;
  }
  .metric-card {
    background: #f5f5f0;
    border-radius: 10px;
    padding: 1rem;
    text-align: center;
  }
  .metric-label { font-size: 12px; color: #888; margin-bottom: 6px; }
  .metric-value { font-size: 28px; font-weight: 500; color: #1a1a1a; }
  @media (max-width: 500px) {
    .container { padding: 1.25rem; }
    .results-grid { grid-template-columns: 1fr; }
    #para-text { font-size: 17px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>اردو ٹائپنگ ٹیسٹ</h1>

  <div class="top-bar">
    <div style="display:flex; align-items:center; gap:10px;">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      <span class="timer-display" id="timer-display">1:00</span>
    </div>
    <div class="controls">
      <label for="timer-select">ٹائمر:</label>
      <select id="timer-select">
        <option value="60">1 منٹ</option>
        <option value="120">2 منٹ</option>
        <option value="180">3 منٹ</option>
        <option value="240">4 منٹ</option>
        <option value="300">5 منٹ</option>
      </select>
      <button onclick="resetTest()">↺ دوبارہ شروع</button>
    </div>
  </div>

  <div class="para-box">
    <p id="para-text"></p>
  </div>

  <div class="size-bar">
    <span>متن کا سائز:</span>
    <button class="size-btn" onclick="setSize(1,'1x')">1x</button>
    <button class="size-btn active" onclick="setSize(1.15,'2x')">2x</button>
    <button class="size-btn" onclick="setSize(1.35,'3x')">3x</button>
    <button class="size-btn" onclick="setSize(1.6,'4x')">4x</button>
    <button class="size-btn" onclick="setSize(1.9,'5x')">5x</button>
  </div>

  <p id="status-msg">ٹائپ شروع کریں — ٹائمر خود بخود شروع ہو جائے گا</p>

  <div class="textarea-wrap">
    <textarea id="user-input" dir="rtl" rows="6" placeholder=""></textarea>
    <div id="overlay" onclick="startFocus()">ٹائپ کرنے کے لیے یہاں کلک کریں</div>
  </div>

  <div id="finished-banner">وقت ختم ہو گیا! آپ کا نتیجہ نیچے دیکھیں</div>

  <div class="results-grid" id="results-grid" style="display:none;">
    <div class="metric-card">
      <div class="metric-label">الفاظ فی منٹ (WPM)</div>
      <div class="metric-value" id="wpm-val">0</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">درستگی (Accuracy)</div>
      <div class="metric-value" id="acc-val">0%</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">کل الفاظ ٹائپ</div>
      <div class="metric-value" id="words-val">0</div>
    </div>
  </div>
</div>

<script>
var allParagraphs = [
  [
    "پاکستان ایک خوبصورت ملک ہے جہاں مختلف ثقافتیں اور زبانیں پائی جاتی ہیں۔",
    "اردو ہماری قومی زبان ہے اور ہمیں اس پر فخر ہونا چاہیے۔",
    "علم حاصل کرنا ہر مسلمان مرد اور عورت پر فرض ہے۔",
    "محنت اور لگن سے انسان اپنی منزل ضرور پاتا ہے۔",
    "اچھے اخلاق اور ادب انسان کی سب سے بڑی دولت ہے۔"
  ],
  [
    "پانی زندگی کا سب سے اہم جزو ہے اور اسے ضائع نہیں کرنا چاہیے۔",
    "صحت مند رہنے کے لیے روزانہ ورزش اور متوازن غذا ضروری ہے۔",
    "کتابیں پڑھنا انسان کے ذہن کو وسیع کرتا ہے اور سوچنے کی صلاحیت بڑھاتا ہے۔",
    "وقت کی قدر کرنے والے لوگ ہی زندگی میں کامیاب ہوتے ہیں۔",
    "دوستی ایک قیمتی رشتہ ہے جسے محبت اور اعتماد سے نبھایا جاتا ہے۔"
  ],
  [
    "سچ بولنا انسان کی سب سے بڑی خوبی ہے اور یہ اسے عزت دلاتا ہے۔",
    "والدین کی خدمت اور ان کا احترام ہر بچے پر فرض ہے۔",
    "درخت لگانا ماحول کو صاف اور سرسبز رکھنے کا بہترین طریقہ ہے۔",
    "تعلیم ہی وہ روشنی ہے جو انسان کو تاریکی سے نکال کر ترقی کی راہ دکھاتی ہے۔",
    "صبر اور شکر کرنے والے لوگ زندگی میں ہمیشہ سکون پاتے ہیں۔"
  ],
  [
    "اتحاد اور بھائی چارہ کسی بھی قوم کی ترقی کی بنیاد ہوتے ہیں۔",
    "ہمیں اپنے ملک سے محبت کرنی چاہیے اور اس کی ترقی کے لیے کام کرنا چاہیے۔",
    "بچوں کو بچپن سے ہی اچھی عادتیں سکھانا ان کا روشن مستقبل بناتا ہے۔",
    "انصاف اور ایمانداری وہ اقدار ہیں جو ایک بہتر معاشرہ تشکیل دیتی ہیں۔",
    "سائنس اور ٹیکنالوجی نے انسان کی زندگی کو آسان اور بہتر بنا دیا ہے۔"
  ],
  [
    "قوموں کی ترقی میں نوجوانوں کا کردار سب سے اہم اور بنیادی ہوتا ہے۔",
    "ہمارے ملک کے کسان دن رات محنت کر کے ہمارے لیے خوراک اگاتے ہیں۔",
    "ادب اور شعر اردو زبان کا سب سے خوبصورت حصہ ہیں جو دل کو چھو لیتے ہیں۔",
    "خاندان کا ساتھ اور محبت انسان کو مشکل وقت میں طاقت دیتی ہے۔",
    "ہمیں غریبوں اور ضرورت مندوں کی مدد کرنی چاہیے کیونکہ یہی انسانیت ہے۔"
  ],
  [
    "علم وہ روشنی ہے جو کبھی بجھتی نہیں اور ہمیشہ راستہ دکھاتی رہتی ہے۔",
    "محبت اور خلوص سے کیا گیا کام ہمیشہ بہترین نتیجہ دیتا ہے۔",
    "ہر انسان کو اپنے حقوق کے ساتھ ساتھ اپنی ذمہ داریاں بھی ادا کرنی چاہییں۔",
    "صفائی نصف ایمان ہے اس لیے ہمیں اپنے گھر اور محلے کو صاف رکھنا چاہیے۔",
    "ملک کی خدمت کرنا ہر شہری کا فرض اور اعزاز ہے۔"
  ],
  [
    "اردو زبان کی مٹھاس اور نرمی اسے دنیا کی خوبصورت ترین زبانوں میں شامل کرتی ہے۔",
    "ہمیں اپنی روایات اور ثقافت کو آنے والی نسلوں تک پہنچانا چاہیے۔",
    "کامیابی کا کوئی شارٹ کٹ نہیں بلکہ یہ مسلسل محنت سے ملتی ہے۔",
    "دوسروں کے ساتھ وہی سلوک کریں جو آپ اپنے لیے پسند کرتے ہیں۔",
    "ہر مشکل کے بعد آسانی آتی ہے اس لیے ہمت نہیں ہارنی چاہیے۔"
  ],
  [
    "استاد وہ شمع ہے جو خود جل کر دوسروں کو روشنی دیتا ہے۔",
    "اپنے وطن کی خاک بھی غیر ملک کے محل سے بہتر ہوتی ہے۔",
    "نیکی کبھی ضائع نہیں جاتی بلکہ کسی نہ کسی شکل میں واپس آتی ہے۔",
    "خوشی بانٹنے سے بڑھتی ہے اور غم بانٹنے سے کم ہوتا ہے۔",
    "جو قومیں اپنی تاریخ سے سبق نہیں سیکھتیں وہ ترقی نہیں کر سکتیں۔"
  ]
];

var baseFontSizes = { para: 20, input: 19 };
var currentSizeMultiplier = 1.15;
var currentSizeLabel = '2x';
var usedParaIndexes = [];
var lastParaIndex = -1;

var timerInterval = null;
var timeLeft = 60;
var totalTime = 60;
var started = false;
var finished = false;
var currentText = '';

var timerDisplay = document.getElementById('timer-display');
var textarea = document.getElementById('user-input');
var statusMsg = document.getElementById('status-msg');
var overlay = document.getElementById('overlay');
var resultsGrid = document.getElementById('results-grid');
var finishedBanner = document.getElementById('finished-banner');
var timerSelect = document.getElementById('timer-select');
var paraText = document.getElementById('para-text');

function setSize(mult, label) {
  currentSizeMultiplier = mult;
  currentSizeLabel = label;
  paraText.style.fontSize = Math.round(baseFontSizes.para * mult) + 'px';
  textarea.style.fontSize = Math.round(baseFontSizes.input * mult) + 'px';
  document.querySelectorAll('.size-btn').forEach(function(btn) {
    btn.classList.toggle('active', btn.textContent.trim() === label);
  });
}

function getRandomParaIndex() {
  if (usedParaIndexes.length >= allParagraphs.length) usedParaIndexes = [];
  var available = [];
  for (var i = 0; i < allParagraphs.length; i++) {
    if (usedParaIndexes.indexOf(i) === -1 && i !== lastParaIndex) available.push(i);
  }
  if (available.length === 0) {
    available = [];
    for (var j = 0; j < allParagraphs.length; j++) {
      if (j !== lastParaIndex) available.push(j);
    }
  }
  var idx = available[Math.floor(Math.random() * available.length)];
  usedParaIndexes.push(idx);
  lastParaIndex = idx;
  return idx;
}

function getWordsForTime(seconds) {
  return Math.ceil(35 * (seconds / 60) * 1.4);
}

function buildParagraph(targetWords) {
  var paraIdx = getRandomParaIndex();
  var sentences = allParagraphs[paraIdx];
  var words = [];
  var sentIdx = 0;
  while (words.length < targetWords) {
    var sentence = sentences[sentIdx % sentences.length];
    words = words.concat(sentence.split(' '));
    sentIdx++;
    if (sentIdx > sentences.length * 5) break;
  }
  var extraIdx = (paraIdx + 1) % allParagraphs.length;
  var extraSentences = allParagraphs[extraIdx];
  var eIdx = 0;
  while (words.length < targetWords + 15) {
    words = words.concat(extraSentences[eIdx % extraSentences.length].split(' '));
    eIdx++;
  }
  return words.slice(0, targetWords + 15).join(' ');
}

function setParagraph() {
  var target = getWordsForTime(totalTime);
  currentText = buildParagraph(target);
  paraText.textContent = currentText;
  textarea.rows = Math.max(6, Math.ceil(totalTime / 60) * 3 + 3);
  setSize(currentSizeMultiplier, currentSizeLabel);
}

function updateTimerDisplay() {
  var m = Math.floor(timeLeft / 60);
  var s = timeLeft % 60;
  timerDisplay.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  if (timeLeft <= 10) timerDisplay.classList.add('warning');
  else timerDisplay.classList.remove('warning');
}

timerSelect.addEventListener('change', function() {
  if (!started) {
    totalTime = parseInt(this.value);
    timeLeft = totalTime;
    updateTimerDisplay();
    setParagraph();
  }
});

function startFocus() {
  overlay.style.display = 'none';
  textarea.focus();
}

textarea.addEventListener('input', function() {
  if (finished) return;
  if (!started && this.value.length > 0) {
    started = true;
    timerSelect.disabled = true;
    statusMsg.textContent = 'ٹائمر شروع ہو گیا — ٹائپ کرتے رہیں!';
    timerInterval = setInterval(function() {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) { clearInterval(timerInterval); finishTest(); }
    }, 1000);
  }
});

function finishTest() {
  finished = true;
  textarea.disabled = true;
  finishedBanner.style.display = 'block';
  statusMsg.textContent = '';
  var origWords = currentText.replace(/\s+/g, ' ').trim().split(' ');
  var typedWords = textarea.value.replace(/\s+/g, ' ').trim().split(' ').filter(function(w){ return w.length > 0; });
  var totalTyped = typedWords.length;
  var correct = 0;
  var len = Math.min(origWords.length, typedWords.length);
  for (var i = 0; i < len; i++) { if (origWords[i] === typedWords[i]) correct++; }
  var wpm = Math.round(totalTyped / (totalTime / 60));
  var acc = totalTyped > 0 ? Math.round((correct / totalTyped) * 100) : 0;
  document.getElementById('wpm-val').textContent = wpm;
  document.getElementById('acc-val').textContent = acc + '%';
  document.getElementById('words-val').textContent = totalTyped;
  resultsGrid.style.display = 'grid';
}

function resetTest() {
  clearInterval(timerInterval);
  started = false; finished = false;
  totalTime = parseInt(timerSelect.value);
  timeLeft = totalTime;
  timerSelect.disabled = false;
  textarea.disabled = false;
  textarea.value = '';
  timerDisplay.classList.remove('warning');
  updateTimerDisplay();
  statusMsg.textContent = 'ٹائپ شروع کریں — ٹائمر خود بخود شروع ہو جائے گا';
  finishedBanner.style.display = 'none';
  resultsGrid.style.display = 'none';
  overlay.style.display = 'flex';
  setParagraph();
}

setParagraph();
updateTimerDisplay();
</script>
</body>
</html>
